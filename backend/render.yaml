services:
  - type: web
    name: dia-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ACCESS_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true